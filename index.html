<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visionary</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Visionary</h1>
    <p class="tagline">Consistency, built into your day.</p>
  </header>

  <main>
    <section class="focus-box">
      <h2>Today's Focus</h2>
      <p class="subtitle">What are you showing up for today?</p>

      <div class="input-row">
        <input type="text" id="task-input" placeholder="Add a task...">
        <button id="add-btn">Add</button>
      </div>

      <ul id="task-list"></ul>

      <p class="streak">🔥 Streak: <span id="streak-count">0</span> days</p>
    </section>
  </main>

  <footer>
    <p>Built by a freshman who believed in the work.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
